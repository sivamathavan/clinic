<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinTone2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#daa76b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8956a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="500" fill="#f0f9ff"/>
  
  <!-- Head -->
  <circle cx="200" cy="120" r="60" fill="url(#skinTone2)"/>
  
  <!-- Hair -->
  <path d="M 140 100 Q 140 50 200 50 Q 260 50 260 100 L 260 130 Q 200 140 140 130 Z" fill="#2c1810"/>
  
  <!-- Eyes -->
  <circle cx="175" cy="110" r="8" fill="#1e293b"/>
  <circle cx="225" cy="110" r="8" fill="#1e293b"/>
  <circle cx="178" cy="108" r="3" fill="white"/>
  <circle cx="228" cy="108" r="3" fill="white"/>
  
  <!-- Smile -->
  <path d="M 175 135 Q 200 150 225 135" stroke="#1e293b" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <line x1="200" y1="115" x2="200" y2="130" stroke="#9d7e71" stroke-width="2"/>
  
  <!-- Neck -->
  <rect x="180" y="180" width="40" height="30" fill="url(#skinTone2)"/>
  
  <!-- Dental coat -->
  <rect x="100" y="210" width="200" height="250" rx="10" fill="white" stroke="#0ea5e9" stroke-width="3"/>
  
  <!-- Buttons -->
  <circle cx="200" cy="240" r="5" fill="#0ea5e9"/>
  <circle cx="200" cy="280" r="5" fill="#0ea5e9"/>
  <circle cx="200" cy="320" r="5" fill="#0ea5e9"/>
  
  <!-- ID Badge -->
  <rect x="155" y="290" width="50" height="70" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="3"/>
  <circle cx="180" cy="310" r="8" fill="#f59e0b"/>
  <text x="180" y="355" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">DR.</text>
  
  <!-- Glasses -->
  <circle cx="170" cy="105" r="15" fill="none" stroke="#64748b" stroke-width="2"/>
  <circle cx="230" cy="105" r="15" fill="none" stroke="#64748b" stroke-width="2"/>
  <line x1="185" y1="105" x2="215" y2="105" stroke="#64748b" stroke-width="2"/>
</svg>