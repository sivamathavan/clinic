<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinTone3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#daa76b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="500" fill="#f0f9ff"/>
  
  <!-- Head -->
  <circle cx="200" cy="120" r="60" fill="url(#skinTone3)"/>
  
  <!-- Hair -->
  <path d="M 140 110 Q 140 55 200 55 Q 260 55 260 110 L 260 140 Q 200 148 140 140 Z" fill="#3e2723"/>
  
  <!-- Eyes -->
  <circle cx="180" cy="115" r="8" fill="#1e293b"/>
  <circle cx="220" cy="115" r="8" fill="#1e293b"/>
  <circle cx="183" cy="113" r="3" fill="white"/>
  <circle cx="223" cy="113" r="3" fill="white"/>
  
  <!-- Smile -->
  <path d="M 180 140 Q 200 155 220 140" stroke="#1e293b" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <line x1="200" y1="120" x2="200" y2="135" stroke="#c79c7e" stroke-width="2"/>
  
  <!-- Neck -->
  <rect x="180" y="180" width="40" height="30" fill="url(#skinTone3)"/>
  
  <!-- Dental coat -->
  <rect x="100" y="210" width="200" height="250" rx="10" fill="#e0f2fe" stroke="#2563eb" stroke-width="3"/>
  
  <!-- Surgical mask (below) -->
  <rect x="160" y="160" width="80" height="35" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <line x1="160" y1="177" x2="240" y2="177" stroke="#2563eb" stroke-width="1"/>
  
  <!-- Buttons -->
  <circle cx="200" cy="240" r="5" fill="#2563eb"/>
  <circle cx="200" cy="280" r="5" fill="#2563eb"/>
  <circle cx="200" cy="320" r="5" fill="#2563eb"/>
  
  <!-- Medical instruments -->
  <g transform="translate(160, 300)">
    <rect x="0" y="0" width="80" height="60" fill="none" stroke="#e0e0e0" stroke-width="2" rx="4"/>
    <circle cx="20" cy="15" r="6" fill="none" stroke="#2563eb" stroke-width="2"/>
    <line x1="20" y1="25" x2="20" y2="40" stroke="#2563eb" stroke-width="2"/>
    <rect x="50" y="10" width="15" height="35" fill="#94a3b8"/>
  </g>
  
  <!-- Award star -->
  <g transform="translate(300, 160)">
    <polygon points="50,10 61,35 88,35 67,50 78,75 50,60 22,75 33,50 12,35 39,35" fill="#f59e0b"/>
  </g>
</svg>