<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinTone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#daa76b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="500" fill="#f0f9ff"/>
  
  <!-- Head -->
  <circle cx="200" cy="120" r="60" fill="url(#skinTone)"/>
  
  <!-- Hair -->
  <path d="M 140 120 Q 140 60 200 60 Q 260 60 260 120" fill="#3e2723"/>
  
  <!-- Eyes -->
  <circle cx="180" cy="110" r="8" fill="#1e293b"/>
  <circle cx="220" cy="110" r="8" fill="#1e293b"/>
  <circle cx="183" cy="108" r="3" fill="white"/>
  <circle cx="223" cy="108" r="3" fill="white"/>
  
  <!-- Smile -->
  <path d="M 180 130 Q 200 145 220 130" stroke="#1e293b" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <line x1="200" y1="115" x2="200" y2="130" stroke="#c79c7e" stroke-width="2"/>
  
  <!-- Neck -->
  <rect x="180" y="180" width="40" height="30" fill="url(#skinTone)"/>
  
  <!-- Dental coat -->
  <rect x="100" y="210" width="200" height="250" rx="10" fill="white" stroke="#2563eb" stroke-width="3"/>
  
  <!-- Buttons -->
  <circle cx="200" cy="240" r="5" fill="#2563eb"/>
  <circle cx="200" cy="280" r="5" fill="#2563eb"/>
  <circle cx="200" cy="320" r="5" fill="#2563eb"/>
  
  <!-- Pocket -->
  <rect x="165" y="280" width="40" height="50" fill="none" stroke="#2563eb" stroke-width="2" rx="4"/>
  
  <!-- Stethoscope symbol -->
  <g transform="translate(170, 290)">
    <circle cx="10" cy="5" r="8" fill="none" stroke="#2563eb" stroke-width="2"/>
    <path d="M 10 13 Q 5 20 0 25" stroke="#2563eb" stroke-width="2" fill="none"/>
    <path d="M 10 13 Q 15 20 20 25" stroke="#2563eb" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Badge/Certificate -->
  <g transform="translate(300, 150)">
    <rect x="0" y="0" width="60" height="80" fill="#fbbf24" rx="4"/>
    <circle cx="30" cy="20" r="12" fill="#f59e0b"/>
    <text x="30" y="55" font-size="24" fill="#92400e" text-anchor="middle" font-weight="bold">MD</text>
  </g>
</svg>